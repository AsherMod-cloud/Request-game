<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Request Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #121212;
            font-family: 'Inter', sans-serif;
        }
        
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }
        
        .glass-effect {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .focus-ring:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        
        .toast {
            animation: slideUp 0.3s ease forwards;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
    <!-- Main Container -->
    <div class="w-full max-w-md p-6">
        <!-- Open Modal Button -->
        <button onclick="openModal()" class="gradient-bg w-full py-3 rounded-lg font-semibold hover:opacity-90 transition">
            Request a Game
        </button>
        
        <!-- Game Request Modal -->
        <div id="requestModal" class="fixed inset-0 z-50 hidden">
            <div class="modal-backdrop absolute inset-0" onclick="closeModal()"></div>
            <div class="flex items-center justify-center min-h-screen p-4">
                <div class="glass-effect rounded-2xl p-8 max-w-md w-full relative">
                    <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                    
                    <h2 class="text-2xl font-bold mb-6 text-center">Request a Game</h2>
                    
                    <form id="requestForm" onsubmit="submitRequest(event)">
                        <div class="mb-4">
                            <label for="gameTitle" class="block text-sm font-medium mb-2">Game Title</label>
                            <input type="text" id="gameTitle" name="game_title" required 
                                   class="w-full px-4 py-2 bg-gray-800 rounded-lg focus:outline-none focus-ring transition"
                                   placeholder="Enter game title">
                        </div>
                        
                        <div class="mb-4">
                            <label for="gameGenre" class="block text-sm font-medium mb-2">Genre</label>
                            <select id="gameGenre" name="genre" required 
                                    class="w-full px-4 py-2 bg-gray-800 rounded-lg focus:outline-none focus-ring transition">
                                <option value="">Select Genre</option>
                                <option value="action">Action</option>
                                <option value="adventure">Adventure</option>
                                <option value="rpg">RPG</option>
                                <option value="strategy">Strategy</option>
                                <option value="puzzle">Puzzle</option>
                                <option value="horror">Horror</option>
                                <option value="simulation">Simulation</option>
                                <option value="sports">Sports</option>
                                <option value="racing">Racing</option>
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <label for="requesterName" class="block text-sm font-medium mb-2">Your Name (Optional)</label>
                            <input type="text" id="requesterName" name="requester_name" 
                                   class="w-full px-4 py-2 bg-gray-800 rounded-lg focus:outline-none focus-ring transition"
                                   placeholder="Enter your name or leave blank for Anonymous">
                        </div>
                        
                        <div class="mb-6">
                            <label for="gameReason" class="block text-sm font-medium mb-2">Why should we play this game? (Optional)</label>
                            <textarea id="gameReason" name="reason" rows="4" 
                                      class="w-full px-4 py-2 bg-gray-800 rounded-lg focus:outline-none focus-ring transition resize-none"
                                      placeholder="Tell us why you'd like to see this game played..."></textarea>
                        </div>
                        
                        <button type="submit" class="gradient-bg w-full py-3 rounded-lg font-semibold hover:opacity-90 transition">
                            Submit Request
                        </button>
                    </form>
                </div>
            </div>
        </div>
        
        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-8 right-8 hidden">
            <div class="toast glass-effect px-6 py-4 rounded-xl flex items-center space-x-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span id="toastMessage">Request submitted successfully!</span>
            </div>
        </div>
    </div>

    <script>
        // Modal functions
        function openModal() {
            document.getElementById('requestModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('requestModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Submit request
        async function submitRequest(event) {
            event.preventDefault();
            
            const form = document.getElementById('requestForm');
            let formData = new FormData(form);
            
            // Handle optional name: set to Anonymous if empty
            let requesterName = document.getElementById('requesterName').value.trim();
            if (!requesterName) {
                requesterName = 'Anonymous';
            }
            formData.set('requester_name', requesterName);
            
            // Reason remains optional (can be empty)
            
            try {
                const response = await fetch('https://formspree.io/f/ENDPOINT_KAMU', {  // Ganti dengan endpoint Formspree-mu
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    showToast('Your game request has been submitted!');
                    closeModal();
                    form.reset();
                } else {
                    showToast('Error submitting request. Try again.');
                }
            } catch (error) {
                showToast('Network error. Check your connection.');
            }
        }

        // Show toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 4000);
        }
    </script>
</body>
</html>
