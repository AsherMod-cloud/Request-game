<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<!-- Tag Penting supaya ukuran responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Mod</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<!-- Background gelap dengan ukuran full screen -->
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-4 sm:p-6">

<!-- Card utama dibuat lebih lebar (max-w-xl) dan padding lebih tebal -->
<div class="bg-gray-900 p-8 sm:p-10 rounded-2xl shadow-2xl w-full max-w-xl border border-gray-800">

    <div class="text-center mb-8">
        <h1 class="text-3xl sm:text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 text-transparent bg-clip-text">
            ✨ Request Mod 💻
        </h1>
        <p class="text-gray-400 mt-2">Kirim request mod yang kamu inginkan</p>
    </div>

    <form id="requestForm" class="space-y-6">

        <!-- Nama -->
        <div>
            <label class="block text-base font-medium text-gray-300 mb-2">Namamu</label>
            <input type="text" id="name" required minlength="2"
                class="w-full p-4 text-lg rounded-xl bg-gray-800 border border-gray-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition"
                placeholder="Masukkan namamu">
        </div>

        <!-- Nama Game -->
        <div>
            <label class="block text-base font-medium text-gray-300 mb-2">Nama Game</label>
            <input type="text" id="modName" required minlength="2"
                class="w-full p-4 text-lg rounded-xl bg-gray-800 border border-gray-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition"
                placeholder="Contoh: Subway Surfers, Frag Pro Shooter">
        </div>

        <!-- Detail Mod -->
        <div>
            <label class="block text-base font-medium text-gray-300 mb-2">Detail Mod</label>
            <textarea id="description" required minlength="5" rows="4"
                class="w-full p-4 text-lg rounded-xl bg-gray-800 border border-gray-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition resize-none"
                placeholder="Jelaskan fitur yang diinginkan (e.g. Unlock Skin, No Ads)"></textarea>
        </div>

        <!-- Contact -->
        <div>
            <label class="block text-base font-medium text-gray-300 mb-2">Contact (Opsional)</label>
            <input type="text" id="contact"
                class="w-full p-4 text-lg rounded-xl bg-gray-800 border border-gray-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition"
                placeholder="Username Telegram / Nomor WA">
        </div>

        <!-- Tombol -->
        <button id="submitBtn" type="submit"
            class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white text-lg font-bold py-4 rounded-xl flex justify-center items-center gap-3 transition transform hover:scale-[1.01] active:scale-[0.99] shadow-lg">
            <span id="btnText">Kirim Request</span>
            <span id="spinner" class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
        </button>

    </form>

    <!-- Status -->
    <div id="status" class="mt-6 text-center text-lg font-medium h-6"></div>

</div>

<script>
const form = document.getElementById('requestForm');
const status = document.getElementById('status');
const btn = document.getElementById('submitBtn');
const spinner = document.getElementById('spinner');
const btnText = document.getElementById('btnText');

let isSubmitting = false;

// Validasi contact (Username WA / Tele)
function isValidContact(input) {
    if (!input) return true;
    if (input.startsWith('@') && input.length >= 5) return true;
    if (/^(08|\+628)\d{7,13}$/.test(input)) return true;
    return false;
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (isSubmitting) return;

    const name = document.getElementById('name').value.trim();
    const modName = document.getElementById('modName').value.trim();
    const description = document.getElementById('description').value.trim();
    const contact = document.getElementById('contact').value.trim();

    if (!isValidContact(contact)) {
        status.innerText = "❌ Format kontak tidak valid!";
        status.className = "mt-6 text-center text-lg font-medium text-red-400";
        return;
    }

    // Set loading state
    isSubmitting = true;
    btn.disabled = true;
    btn.classList.add('opacity-80');
    spinner.classList.remove('hidden');
    btnText.innerText = "Mengirim...";

    try {
        const res = await fetch('/api/telegram', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, modName, description, contact })
        });

        const result = await res.json();

        if (result.success) {
            status.innerText = "✅ Berhasil terkirim!";
            status.className = "mt-6 text-center text-lg font-medium text-green-400";
            form.reset();
        } else {
            throw new Error(result.error || "Server Error");
        }

    } catch (err) {
        status.innerText = "❌ Gagal: " + err.message;
        status.className = "mt-6 text-center text-lg font-medium text-red-400";
    }

    // Reset button
    isSubmitting = false;
    btn.disabled = false;
    btn.classList.remove('opacity-80');
    spinner.classList.add('hidden');
    btnText.innerText = "Kirim Request";
});
</script>

</body>
    </html>
