<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Request Mod</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center px-4">

<div class="bg-gray-900 p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-800">

    <h1 class="text-2xl font-bold text-center mb-1">Request Mod</h1>
    <p class="text-gray-400 text-center text-sm mb-6">Kirim request mod yang kamu inginkan</p>

    <form id="requestForm" class="space-y-4">

        <div>
            <label class="text-sm">Nama</label>
            <input type="text" id="name" required minlength="2"
                class="w-full mt-1 p-2 rounded bg-gray-800 border border-gray-700">
        </div>

        <div>
            <label class="text-sm">Nama Game</label>
            <input type="text" id="modName" required minlength="2"
                class="w-full mt-1 p-2 rounded bg-gray-800 border border-gray-700">
        </div>

        <div>
            <label class="text-sm">Detail Mod</label>
            <textarea id="description" required minlength="5"
                class="w-full mt-1 p-2 rounded bg-gray-800 border border-gray-700"></textarea>
        </div>

        <div>
            <label class="text-sm">
                Username Telegram / Nomor WA (Opsional)
            </label>
            <input type="text" id="contact"
                placeholder="@username / 08xxxx"
                class="w-full mt-1 p-2 rounded bg-gray-800 border border-gray-700">
        </div>

        <button id="submitBtn"
            class="w-full bg-blue-600 py-2 rounded flex justify-center items-center gap-2">
            <span id="btnText">Kirim Request</span>
            <span id="spinner"
                class="hidden animate-spin border-2 border-white border-t-transparent rounded-full w-4 h-4"></span>
        </button>

    </form>

    <p id="status" class="mt-4 text-center text-sm"></p>

</div>

<script>
const form = document.getElementById('requestForm');
const status = document.getElementById('status');
const btn = document.getElementById('submitBtn');
const spinner = document.getElementById('spinner');
const btnText = document.getElementById('btnText');

let isSubmitting = false;

function isValidContact(input) {
    if (!input) return true;
    if (input.startsWith('@') && input.length >= 5) return true;
    if (/^(08|\+628)\d{7,13}$/.test(input)) return true;
    return false;
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (isSubmitting) return;

    const name = document.getElementById('name').value.trim();
    const modName = document.getElementById('modName').value.trim();
    const description = document.getElementById('description').value.trim();
    const contact = document.getElementById('contact').value.trim();

    if (!isValidContact(contact)) {
        status.innerText = "Format kontak tidak valid";
        status.className = "text-red-400 mt-4 text-sm";
        return;
    }

    isSubmitting = true;
    btn.disabled = true;
    spinner.classList.remove('hidden');
    btnText.innerText = "Mengirim...";

    try {
        const res = await fetch('/api/telegram', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, modName, description, contact })
        });

        const result = await res.json();

        if (result.success) {
            status.innerText = "✅ Berhasil dikirim!";
            status.className = "text-green-400 mt-4 text-sm";
            form.reset();
        } else {
            throw new Error(result.error);
        }

    } catch (err) {
        status.innerText = "❌ " + err.message;
        status.className = "text-red-400 mt-4 text-sm";
    }

    isSubmitting = false;
    btn.disabled = false;
    spinner.classList.add('hidden');
    btnText.innerText = "Kirim Request";
});
</script>

</body>
    </html>
