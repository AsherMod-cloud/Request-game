<!DOCTYPE html>  <html lang="id">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Request Mod | AsherMod</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <style>  
        @keyframes fadeIn {  
            from { opacity: 0; transform: scale(0.95); }  
            to { opacity: 1; transform: scale(1); }  
        }  
        .animate-pop { animation: fadeIn 0.3s ease-out forwards; }  .glow-text {  
        text-shadow: 0 0 10px rgba(59, 130, 246, 0.5), 0 0 20px rgba(147, 51, 234, 0.3);  
    }  
    .glow-input:focus {  
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);  
    }  
    /* Custom Checkbox Style */  
    .custom-checkbox {  
        width: 18px;  
        height: 18px;  
        cursor: pointer;  
        accent-color: #3b82f6;  
    }  
</style>

</head>  <body class="bg-[#050505] text-gray-200 min-h-screen flex items-center justify-center p-4 selection:bg-purple-500/30 font-sans">  <div class="bg-gray-900/50 backdrop-blur-xl p-8 rounded-3xl shadow-[0_0_50px_-12px_rgba(0,0,0,0.5)] w-full max-w-xl border border-gray-800/50 relative overflow-hidden">  
    <div class="absolute -top-24 -right-24 w-48 h-48 bg-purple-600/10 rounded-full blur-3xl"></div>  
      
    <div class="text-center mb-8 relative">  
        <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 via-purple-400 to-indigo-400 text-transparent bg-clip-text glow-text tracking-tight">  
            ✨ Request Mod  
        </h1>  
        <p class="text-gray-500 mt-2 text-sm font-medium uppercase tracking-widest italic">v1.0 • AsherMod Portal</p>  
    </div>  

    <form id="requestForm" class="space-y-5 relative">  
        <div class="group">  
            <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block transition-colors group-focus-within:text-blue-400">PENGIRIM</label>  
            <input type="text" id="name" class="w-full p-3.5 rounded-2xl bg-gray-800/40 border border-gray-700/50 focus:border-blue-500/50 outline-none transition-all glow-input" placeholder="Kosongkan untuk anonim">  
        </div>  

        <div class="group">  
            <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block transition-colors group-focus-within:text-blue-400">TARGET GAME / APP</label>  
            <input type="text" id="modName" required class="w-full p-3.5 rounded-2xl bg-gray-800/40 border border-gray-700/50 focus:border-blue-500/50 outline-none transition-all glow-input" placeholder="Contoh: Subway Surfers, Minecraft">  
        </div>  

        <div class="group">  
            <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block transition-colors group-focus-within:text-blue-400">DETAIL FITUR</label>  
            <textarea id="description" required rows="4" class="w-full p-3.5 rounded-2xl bg-gray-800/40 border border-gray-700/50 focus:border-blue-500/50 outline-none transition-all glow-input resize-none" placeholder="Sebutkan fitur mod yang diinginkan..."></textarea>  
        </div>  

        <div class="group">  
            <label class="text-xs font-semibold text-gray-500 ml-1 mb-1 block transition-colors group-focus-within:text-blue-400">CONTACT INFO</label>  
            <input type="text" id="contact" class="w-full p-3.5 rounded-2xl bg-gray-800/40 border border-gray-700/50 focus:border-blue-500/50 outline-none transition-all glow-input" placeholder="@telegram / WhatsApp">  
        </div>  

        <button id="submitBtn" class="w-full bg-gradient-to-br from-blue-600 to-purple-700 py-4 rounded-2xl font-bold text-white shadow-lg shadow-blue-900/20 hover:shadow-blue-600/20 hover:brightness-110 active:scale-[0.98] transition-all flex justify-center items-center gap-3">  
            <span id="btnText">Kirim Request</span>  
            <span id="spinner" class="hidden animate-spin h-5 w-5 border-2 border-white/30 border-t-white rounded-full"></span>  
        </button>  
    </form>  

    <div id="status" class="mt-4 text-center text-sm font-medium min-h-[1.25rem]"></div>  
</div>  

<div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">  
    <div class="bg-gray-900 border border-gray-800 p-8 rounded-[2rem] text-center max-w-sm w-full shadow-2xl animate-pop relative overflow-hidden">  
        <div class="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center mx-auto mb-5 border border-blue-500/20">  
            <span class="text-3xl">👋</span>  
        </div>  
        <h2 class="text-2xl font-bold text-white mb-2">Halo, Modder!</h2>  
        <div class="space-y-3 mb-6 text-gray-400 text-sm leading-relaxed">  
            <p>Selamat datang di form request. Mohon perhatikan poin berikut:</p>  
            <ul class="text-left space-y-2 inline-block mx-auto">  
                <li class="flex items-center gap-2"><span class="text-blue-400">✓</span> Deskripsi harus jelas</li>  
                <li class="flex items-center gap-2"><span class="text-red-400">×</span> Dilarang spam request</li>  
                <li class="flex items-center gap-2"><span class="text-purple-400">✓</span> Sertakan kontak aktif</li>  
            </ul>  
        </div>  

        <div class="flex items-center justify-center gap-3 mb-6 p-3 bg-gray-800/30 rounded-xl border border-gray-800 hover:border-gray-700 transition-all cursor-pointer group" onclick="document.getElementById('dontShow').click()">  
            <input type="checkbox" id="dontShow" class="custom-checkbox" onclick="event.stopPropagation()">  
            <label for="dontShow" class="text-sm text-gray-400 cursor-pointer group-hover:text-gray-300 transition-colors">Jangan tampilkan lagi</label>  
        </div>  

        <button id="closeModal" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-500 transition-colors active:scale-95 shadow-lg shadow-blue-900/20">  
            Saya Mengerti  
        </button>  
          
        <p class="mt-4 text-[10px] text-gray-600 uppercase tracking-tighter italic">Credit: AsherMod Dev</p>  
    </div>  
</div>  

<!-- AUDIO SYSTEM -->

<audio id="clickSound" src="sounds/mouse-click.mp3" preload="auto"></audio>
<audio id="successSound" src="sounds/Successfully.m4a" preload="auto"></audio>
<audio id="errorSound" src="sounds/error-beep.mp3" preload="auto"></audio>

<!-- SOUND TOGGLE -->  <button id="soundToggle"  
class="fixed bottom-4 right-4 bg-gray-800 border border-gray-700 px-4 py-2 rounded-xl text-sm hover:bg-gray-700 transition">
🔊 Sound: ON
</button>

<script>

const form = document.getElementById('requestForm');
const status = document.getElementById('status');
const btn = document.getElementById('submitBtn');
const spinner = document.getElementById('spinner');
const btnText = document.getElementById('btnText');

const modal = document.getElementById('modal');
const closeModal = document.getElementById('closeModal');

const clickSound = document.getElementById('clickSound');
const successSound = document.getElementById('successSound');
const errorSound = document.getElementById('errorSound');

const soundToggle = document.getElementById('soundToggle');

let isSubmitting = false;

/* =========================
SOUND SYSTEM
========================= */

// Load state dari localStorage
let soundEnabled = localStorage.getItem("soundEnabled") !== "false";

function updateSoundUI() {
soundToggle.innerText = soundEnabled ? "🔊 Sound: ON" : "🔇 Sound: OFF";
}

updateSoundUI();

// Toggle sound
soundToggle.onclick = () => {
soundEnabled = !soundEnabled;
localStorage.setItem("soundEnabled", soundEnabled);
updateSoundUI();
};

// Play helper
function playSound(audio) {
if (!soundEnabled) return;
audio.currentTime = 0;
audio.play().catch(() => {});
}

/* =========================
WELCOME MODAL
========================= */

window.addEventListener("load", () => {
if (!localStorage.getItem("welcomeShown")) {
setTimeout(() => modal.classList.remove('hidden'), 300);
}
});

closeModal.onclick = () => {
modal.classList.add('hidden');
localStorage.setItem("welcomeShown", "true");
playSound(clickSound);
};

/* =========================
STOP SOUND (BACKGROUND FIX)
========================= */

document.addEventListener("visibilitychange", () => {
if (document.hidden) {
[clickSound, successSound, errorSound].forEach(a => {
a.pause();
a.currentTime = 0;
});
}
});

/* =========================
VALIDASI CONTACT
========================= */

function isValidContact(input) {
if (!input) return true;
if (input.startsWith('@') && input.length >= 5) return true;
if (/^(08|+628)\d{7,13}$/.test(input)) return true;
return false;
}

/* =========================
GLOBAL CLICK SOUND
========================= */

document.addEventListener("click", (e) => {
if (e.target.closest("button")) {
playSound(clickSound);
}
});

/* =========================
SUBMIT FORM
========================= */

form.addEventListener('submit', async (e) => {
e.preventDefault();
if (isSubmitting) return;

let name = document.getElementById('name').value.trim();  
const modName = document.getElementById('modName').value.trim();  
const description = document.getElementById('description').value.trim();  
const contact = document.getElementById('contact').value.trim();  

if (!name) name = "Anonymous";  

if (!isValidContact(contact)) {  
    status.innerHTML = "<span class='text-red-400'>❌ Format kontak tidak valid</span>";  
    playSound(errorSound);  
    return;  
}  

isSubmitting = true;  
btn.disabled = true;  
btn.classList.add('opacity-70');  
spinner.classList.remove('hidden');  
btnText.innerText = "Mengirim...";  

try {  
    status.innerHTML = "<span class='text-blue-400 animate-pulse'>⏳ Mengirim request...</span>";  

    const res = await fetch('/api/telegram', {  
        method: 'POST',  
        headers: { 'Content-Type': 'application/json' },  
        body: JSON.stringify({ name, modName, description, contact })  
    });  

    const result = await res.json();  

    if (!res.ok || !result.success) {  
        throw new Error(result.error || "Server error");  
    }  

    // Delay dikit biar smooth  
    setTimeout(() => {  
        playSound(successSound);  
    }, 150);  

    status.innerHTML = "<span class='text-green-400 text-lg'>✅ Request berhasil dikirim!</span>";  
    form.reset();  

} catch (err) {  
    status.innerHTML = `<span class='text-red-400'>❌ ${err.message}</span>`;  
    playSound(errorSound);  
} finally {  
    isSubmitting = false;  
    btn.disabled = false;  
    btn.classList.remove('opacity-70');  
    spinner.classList.add('hidden');  
    btnText.innerText = "Kirim Request";  
}

});
</script>

</body>  
</html>
