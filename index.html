<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Mod</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-4">

<!-- CARD -->
<div class="bg-gray-900 p-8 rounded-2xl shadow-2xl w-full max-w-xl border border-gray-800">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 text-transparent bg-clip-text">
            ✨ Request Mod
        </h1>
        <p class="text-gray-400 mt-2">Kirim request mod yang kamu inginkan</p>
    </div>

    <form id="requestForm" class="space-y-6">

        <!-- Nama -->
        <div>
            <label class="text-gray-300">Namamu (Opsional)</label>
            <input type="text" id="name"
                class="w-full p-3 mt-1 rounded-xl bg-gray-800 border border-gray-700 focus:border-blue-500 outline-none"
                placeholder="Kosongkan jika ingin anonim">
        </div>

        <!-- Game -->
        <div>
            <label class="text-gray-300">Nama Game</label>
            <input type="text" id="modName" required
                class="w-full p-3 mt-1 rounded-xl bg-gray-800 border border-gray-700 focus:border-blue-500 outline-none">
        </div>

        <!-- Detail -->
        <div>
            <label class="text-gray-300">Detail Mod</label>
            <textarea id="description" required rows="4"
                class="w-full p-3 mt-1 rounded-xl bg-gray-800 border border-gray-700 focus:border-blue-500 outline-none"></textarea>
        </div>

        <!-- Contact -->
        <div>
            <label class="text-gray-300">Contact (Opsional)</label>
            <input type="text" id="contact"
                class="w-full p-3 mt-1 rounded-xl bg-gray-800 border border-gray-700 focus:border-blue-500 outline-none"
                placeholder="@telegram / 08xxx">
        </div>

        <!-- Button -->
        <button id="submitBtn"
            class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-3 rounded-xl font-bold flex justify-center items-center gap-2 hover:scale-105 active:scale-95 transition">
            <span id="btnText">Kirim Request</span>
            <span id="spinner" class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
        </button>

    </form>

    <div id="status" class="mt-4 text-center"></div>
</div>

<!-- WELCOME MODAL -->
<div id="modal" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden">
  <div class="bg-gray-900 p-6 rounded-xl text-center border border-gray-700 max-w-sm">
    <h2 class="text-xl font-bold mb-3">👋 Welcome</h2>
    <p class="text-gray-300 text-sm mb-4">
      Kirim request dengan jelas ya 🙌<br>
      🚫 Hindari spam<br>
      📩 Isi contact jika ingin dihubungi
    </p>
    <button id="closeModal" class="bg-blue-600 px-4 py-2 rounded-lg">OK</button>
  </div>
</div>

<!-- SOUND (EVENT ONLY) -->
<audio id="clickSound" src="https://files.catbox.moe/3xte9v.mp3"></audio>
<audio id="successSound" src="https://files.catbox.moe/6f3x9k.mp3"></audio>

<script>
const form = document.getElementById('requestForm');
const status = document.getElementById('status');
const btn = document.getElementById('submitBtn');
const spinner = document.getElementById('spinner');
const btnText = document.getElementById('btnText');

const clickSound = document.getElementById('clickSound');
const successSound = document.getElementById('successSound');

let isSubmitting = false;

/* =========================
   WELCOME MODAL
========================= */
const modal = document.getElementById('modal');
const closeModal = document.getElementById('closeModal');

if (!localStorage.getItem("welcomeShown")) {
    modal.classList.remove('hidden');
}

closeModal.onclick = () => {
    modal.classList.add('hidden');
    localStorage.setItem("welcomeShown", "true");
    clickSound.play().catch(()=>{});
};

/* =========================
   STOP SOUND IF TAB HIDDEN
========================= */
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        clickSound.pause();
        successSound.pause();
    }
});

/* =========================
   VALIDASI CONTACT
========================= */
function isValidContact(input) {
    if (!input) return true;
    if (input.startsWith('@')) return true;
    if (/^(08|\+628)\d{7,13}$/.test(input)) return true;
    return false;
}

/* =========================
   SUBMIT
========================= */
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (isSubmitting) return;

    let name = document.getElementById('name').value.trim();
    const modName = document.getElementById('modName').value.trim();
    const description = document.getElementById('description').value.trim();
    const contact = document.getElementById('contact').value.trim();

    if (!name) name = "Anonymous";

    if (!isValidContact(contact)) {
        status.innerText = "❌ Format kontak tidak valid";
        return;
    }

    isSubmitting = true;
    btn.disabled = true;
    spinner.classList.remove('hidden');
    btnText.innerText = "Mengirim...";

    try {
        status.innerText = "⏳ Mengirim...";
        
        const res = await fetch('/api/telegram', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, modName, description, contact })
        });

        const result = await res.json();

        if (result.success) {
            successSound.play().catch(()=>{});
            status.innerText = "✅ Berhasil terkirim!";
            form.reset();
        } else {
            throw new Error(result.error);
        }

    } catch (err) {
        status.innerText = "❌ " + err.message;
    }

    isSubmitting = false;
    btn.disabled = false;
    spinner.classList.add('hidden');
    btnText.innerText = "Kirim Request";
});
</script>

</body>
    </html>
