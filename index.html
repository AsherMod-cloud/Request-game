<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Request Mod</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animasi agar munculnya halus */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-modal { animation: fadeIn 0.3s ease-out forwards; }
        
        /* Menghilangkan scroll saat modal muncul */
        .modal-open { overflow: hidden; }
    </style>
</head>

<body class="bg-black text-gray-200 min-h-screen flex items-center justify-center p-4">

<div class="bg-[#0f111a] p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-gray-800/50 relative">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 text-transparent bg-clip-text">
            ✨ Request Mod
        </h1>
        <p class="text-gray-500 text-[10px] tracking-widest mt-1 uppercase">V1.0 • DEV PORTAL</p>
    </div>

    <form id="requestForm" class="space-y-4">
        <div>
            <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">Pengirim</label>
            <input type="text" id="name" class="w-full p-3 rounded-xl bg-gray-900/50 border border-gray-800 focus:border-blue-500 outline-none transition-all" placeholder="Kosongkan untuk anonim">
        </div>
        <div>
            <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">Target Game</label>
            <input type="text" id="modName" required class="w-full p-3 rounded-xl bg-gray-900/50 border border-gray-800 focus:border-blue-500 outline-none transition-all" placeholder="Contoh: Mobile Legends">
        </div>
        <div>
            <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">Detail Fitur</label>
            <textarea id="description" required rows="3" class="w-full p-3 rounded-xl bg-gray-900/50 border border-gray-800 focus:border-blue-500 outline-none transition-all resize-none" placeholder="Apa yang ingin di-mod?"></textarea>
        </div>
        <div>
            <label class="text-[10px] font-bold text-gray-500 ml-1 uppercase">Contact Info</label>
            <input type="text" id="contact" class="w-full p-3 rounded-xl bg-gray-900/50 border border-gray-800 focus:border-blue-500 outline-none transition-all" placeholder="@telegram / WA">
        </div>

        <button id="submitBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 py-3.5 rounded-2xl font-bold hover:brightness-110 active:scale-95 transition-all mt-2 shadow-lg shadow-blue-900/20">
            <span id="btnText">Kirim Request</span>
        </button>
    </form>
    <div id="status" class="mt-4 text-center text-sm font-medium"></div>
</div>

<div id="modal" class="fixed inset-0 z-[9999] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm hidden">
    <div class="bg-[#161b22] border border-gray-800 w-full max-w-[320px] rounded-[2.5rem] p-8 text-center shadow-2xl animate-modal">
        <div class="text-4xl mb-4">👋</div>
        <h2 class="text-xl font-bold text-white mb-2">Welcome!</h2>
        <div class="text-gray-400 text-sm leading-relaxed mb-6">
            <p>Kirim request dengan jelas ya 🙌</p>
            <p class="mt-1">🚫 Hindari spam berlebihan</p>
            <p class="mt-1">📩 Isi kontak jika ingin dihubungi</p>
        </div>
        <button id="closeModal" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-2xl transition-all active:scale-95 shadow-lg shadow-blue-900/40">
            Siap, Paham!
        </button>
    </div>
</div>

<script>
const form = document.getElementById('requestForm');
const status = document.getElementById('status');
const btn = document.getElementById('submitBtn');
const spinner = document.getElementById('spinner');
const btnText = document.getElementById('btnText');
const modal = document.getElementById('modal');
const closeModal = document.getElementById('closeModal');
const clickSound = document.getElementById('clickSound');
const successSound = document.getElementById('successSound');

let isSubmitting = false;

/* =========================
   WELCOME MODAL
========================= */
window.onload = () => {
    if (!localStorage.getItem("welcomeShown")) {
        setTimeout(() => modal.classList.remove('hidden'), 300);
    }
};

closeModal.onclick = () => {
    modal.classList.add('hidden');
    localStorage.setItem("welcomeShown", "true");
    clickSound.play().catch(()=>{});
};

/* =========================
   STOP SOUND (ANTI BACKGROUND BUG)
========================= */
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        clickSound.pause();
        successSound.pause();
        clickSound.currentTime = 0;
        successSound.currentTime = 0;
    }
});

/* =========================
   VALIDASI CONTACT
========================= */
function isValidContact(input) {
    if (!input) return true;
    if (input.startsWith('@')) return true;
    if (/^(08|\+628)\d{7,13}$/.test(input)) return true;
    return false;
}

/* =========================
   SUBMIT
========================= */
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (isSubmitting) return;

    let name = document.getElementById('name').value.trim();
    const modName = document.getElementById('modName').value.trim();
    const description = document.getElementById('description').value.trim();
    const contact = document.getElementById('contact').value.trim();

    if (!name) name = "Anonymous";

    if (!isValidContact(contact)) {
        status.innerHTML = "<span class='text-red-400'>❌ Format kontak tidak valid</span>";
        return;
    }

    isSubmitting = true;
    btn.disabled = true;
    btn.classList.add('opacity-70');
    spinner.classList.remove('hidden');
    btnText.innerText = "Mengirim...";

    try {
        status.innerHTML = "<span class='text-blue-400 animate-pulse'>⏳ Mengirim request...</span>";

        const res = await fetch('/api/telegram', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, modName, description, contact })
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
            throw new Error(result.error || "Server error");
        }

        successSound.play().catch(()=>{});
        status.innerHTML = "<span class='text-green-400 text-lg'>✅ Request berhasil dikirim!</span>";
        form.reset();

    } catch (err) {
        status.innerHTML = `<span class='text-red-400'>❌ ${err.message}</span>`;
    } finally {
        isSubmitting = false;
        btn.disabled = false;
        btn.classList.remove('opacity-70');
        spinner.classList.add('hidden');
        btnText.innerText = "Kirim Request";
    }
});
</script>

</body>
    </html>
